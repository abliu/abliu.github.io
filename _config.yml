# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Andrew Liu
# email: your-email@example.com
# description: >- # this means to ignore newlines until "baseurl:"
#   Write an awesome description for your new site here. You can edit this
#   line in _config.yml. It will appear in your document head meta (for
#   Google search results) and in your feed.xml site description.
baseurl: "" # the subpath of your site, e.g. /blog
domain: abliu.github.io       # if you want to force HTTPS, specify the domain without the http at the start, e.g. example.com
url: https://abliu.github.io # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: andrew2liu
github_username:  abliu

# Homepage intro + links (rendered by _layouts/home.html)
profile:
  headline: "I am Head of Applied Research on SecureBio's AI team and did my PhD in bioinformatics at Harvard."
  tagline: "Thinking about biosecurity, health AI, volleyball, and what makes for a fulfilling life."
  # Each link shows in the row under the intro. Add/remove freely.
  # Set `external: true` to get the ↗ arrow.
  links:
    - { name: "GitHub",   url: "https://github.com/abliu",           external: true }
    - { name: "Twitter",  url: "https://twitter.com/andrew2liu",     external: true }
    - { name: "LinkedIn", url: "https://www.linkedin.com/in/andrew-liu-phd-8bb07929/", external: true }
    # - { name: "Email",    url: "mailto:you@example.com" }
    # - { name: "Scholar",  url: "https://scholar.google.com/...",  external: true }
  # Short "Background" blurb shown at the bottom of the homepage (Markdown OK).
  background: >
    I'm Head of Applied Research on [SecureBio](https://securebio.org/)'s AI team
    and a graduate of Harvard's Bioinformatics and Integrative Genomics PhD program
    (Michael Springer's lab). I've published research in infectious-disease early
    detection, biosecurity, and pandemic preparedness, and was a Fellow in the
    Emerging Leaders in Biosecurity program.

# Featured-star threshold: posts with importance >= this get a ★ on the homepage.
featured_importance: 5

# Show just the year next to each post on the homepage list.
minima:
  date_format: "%Y"

# Umami analytics (Umami Cloud free tier). Paste your website ID below after
# creating the site at https://cloud.umami.is — the script only loads in
# production once `website_id` is set, so local `jekyll serve` views aren't counted.
umami:
  website_id: "400856de-b21c-493e-ba2f-20a02511ca36"   # e.g. "1a2b3c4d-...". Leave blank to disable.
  src: "https://cloud.umami.is/script.js"

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - old/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
